<script>
// amosOZ v0.4.0 kernel — ported from amosoz.py (browser + Node)
const VERSION = "0.4.0";
const SYSTEM_NAME = "amosOZ";
const BUILD_DATE = "2026-06-30";
const MOTD = `amosOZ v${VERSION} — Arianna Method Operating System\nDedicated to Amos Oz (עוז — strength, courage)\nCompatibility is a treaty, not obedience.\nType 'help', 'selftest', or 'motd'. Every command leaves a trace.\n`;
const MAX_SCRIPT_DEPTH = 8;
const ERR_OK = 0, ERR_NOT_FOUND = 1, ERR_PERMISSION = 2, ERR_EXISTS = 3;
const ERR_NO_MEMORY = 4, ERR_INVALID = 5, ERR_IO = 6, ERR_NO_PROCESS = 7, ERR_MODULE = 8;
const BUILTIN_SLOTS = ["shell.commands","fs.drivers","devices","ai.hooks","sched.hooks","boot.hooks","diagnostics","experiments","oz.contracts","oz.ledger"];

function nowSec() { return Date.now() / 1000; }
function strTrim(s) { return (s || "").trim(); }
function patmatch(pat, name) {
    if (!pat || !name) return false;
    if (pat === "*") return true;
    if (!pat.includes("*")) return pat === name;
    const i = pat.indexOf("*");
    const pre = pat.slice(0, i), suffix = pat.slice(i + 1);
    return name.startsWith(pre) && name.endsWith(suffix) && suffix.length <= name.length;
}
function detectHardware() {
    const hw = { platform: "unknown", platform_release: "unknown", machine: "browser", processor: "unknown",
        cpu_count: -1, memory_mb: -1, terminal: "browser", persistence: 1, hostname: "amosoz" };
    try { hw.platform = navigator.platform || "unknown"; } catch (_) {}
    try { hw.cpu_count = navigator.hardwareConcurrency || -1; hw.processor = String(hw.cpu_count); } catch (_) {}
    try { if (navigator.deviceMemory) hw.memory_mb = navigator.deviceMemory * 1024; } catch (_) {}
    return hw;
}

class VirtualMemory {
    constructor(totalKb = 65536) { this.total = totalKb; this.used = 0; this.blocks = {}; this.nextId = 1; }
    alloc(size, owner = "system", flags = "rw-") {
        if (this.used + size > this.total) return [null, ERR_NO_MEMORY];
        const bid = this.nextId++;
        this.blocks[bid] = { size, flags, owner };
        this.used += size;
        return [bid, ERR_OK];
    }
    free(bid) {
        if (!(bid in this.blocks)) return ERR_NOT_FOUND;
        this.used -= this.blocks[bid].size;
        delete this.blocks[bid];
        return ERR_OK;
    }
    stats() { return { total_kb: this.total, used_kb: this.used, free_kb: this.total - this.used, blocks: Object.keys(this.blocks).length }; }
    mmap() { return Object.entries(this.blocks); }
}

class VirtualFS {
    constructor(kernel = null) { this.tree = {}; this.cwd = "/"; this.kernel = kernel; this._initTree(); }
    _node(ntype, kw = {}) {
        const t = nowSec();
        return Object.assign({ type: ntype, perms: "rw-r--r--", created: t, modified: t, owner: "user", content: "", symlink_target: "" }, kw);
    }
    _initTree() {
        for (const d of ["/","/bin","/etc","/home","/tmp","/var","/dev","/proc","/sys","/usr","/usr/lib","/usr/share","/usr/share/amosoz","/home/user","/var/log","/etc/amosoz"])
            this.tree[d] = this._node("dir", { perms: "rwxr-xr-x", owner: "root" });
        this.tree["/etc/hostname"] = this._node("file", { content: "amosoz", owner: "root" });
        this.tree["/etc/amosoz/version"] = this._node("file", { content: VERSION, owner: "root" });
        this.tree["/etc/motd"] = this._node("file", { owner: "root", content: "amosOZ — Arianna Method Operating System\nDedicated to Amos Oz (עוז)\nOZ begins where extension becomes accountable.\n" });
        this.tree["/etc/os-release"] = this._node("file", { owner: "root", content: `NAME="amosOZ"\nPRETTY_NAME="amosOZ (Arianna Method Operating System)"\nID=amosoz\nVERSION_ID="${VERSION}"\nHOME_URL="https://github.com/ariannamethod/amos.OZ"\nSUPPORT_END="never"\n` });
        for (const p of ["/proc/uptime","/proc/meminfo","/proc/cpuinfo","/proc/version","/proc/self/status"])
            this.tree[p] = this._node("file", { owner: "root", content: "" });
        this.tree["/usr/share/amosoz/quotes.txt"] = this._node("file", { owner: "root", content: "A conflict begins and ends in the hearts of men, not in the hills.\nThe opposite of indifference is not love but curiosity.\nWe all pay a price for our dreams.\nעוז — strength lives in the willingness to see the other.\nLiterature is a chamber of justice without a judge.\n" });
        for (const name of ["echo","ls","cat","pwd","uname","whoami","date","help","grep","head","tail","wc","test","hostname","id","true","false","uptime","dmesg","find","ln","export","source","spec","doctor"])
            this.tree[`/bin/${name}`] = this._node("file", { content: "#!/amossh\n__builtin__\n", perms: "rwxr-xr-x", owner: "root" });
        this.tree["/home/user/hello.amos"] = this._node("file", { perms: "rwxr-xr-x", owner: "user", content: "#!/amossh\necho Script greeting:\necho $@\n" });
    }
    _normalize(path, cwd = null) {
        cwd = cwd !== null ? cwd : this.cwd;
        if (!path.startsWith("/")) path = cwd === "/" ? "/" + path : cwd + "/" + path;
        const parts = [];
        for (const p of path.split("/")) {
            if (!p || p === ".") continue;
            if (p === "..") { if (parts.length) parts.pop(); } else parts.push(p);
        }
        return parts.length ? "/" + parts.join("/") : "/";
    }
    _resolve(path, follow = true) {
        let out = this._normalize(path);
        if (!follow) return out;
        for (let i = 0; i < 8; i++) {
            const node = this.tree[out];
            if (!node || node.type !== "symlink") break;
            out = this._normalize(node.symlink_target);
        }
        return out;
    }
    resolveNode(path) { return this._resolve(path); }
    _permBit(perms, bit) { return perms && perms.length >= 9 && perms[bit] !== "-"; }
    access(path, user, op) {
        const r = this._resolve(path, false);
        const node = this.tree[r];
        if (!node) return ERR_NOT_FOUND;
        if (user === "root") return ERR_OK;
        const base = node.owner === user ? 0 : 6;
        let bit = base;
        if (op === "r") bit += 0; else if (op === "w") bit += 1; else if (op === "x") bit += 2; else return ERR_INVALID;
        return this._permBit(node.perms, bit) ? ERR_OK : ERR_PERMISSION;
    }
    addSymlink(linkpath, target) {
        const r = this._normalize(linkpath);
        if (r in this.tree) return ERR_EXISTS;
        this.tree[r] = this._node("symlink", { perms: "lrwxrwxrwx", symlink_target: this._resolve(target) });
        return ERR_OK;
    }
    readToBuf(path) {
        if (this.kernel && this.kernel.procIsVirtual(path)) this.kernel.procRefreshAll();
        const r = this._resolve(path);
        const node = this.tree[r];
        if (!node || node.type === "dir" || node.type === "symlink") return [null, ERR_NOT_FOUND];
        if (this.kernel && this.kernel.accessNode(r, "r") !== ERR_OK) return [null, ERR_PERMISSION];
        return [node.content || "", ERR_OK];
    }
    exists(path) { return this._resolve(path) in this.tree; }
    mkdir(path) {
        const r = this._resolve(path);
        if (r in this.tree) return ERR_EXISTS;
        const parent = r.split("/").slice(0, -1).join("/") || "/";
        if (!(parent in this.tree) || this.tree[parent].type !== "dir") return ERR_NOT_FOUND;
        this.tree[r] = this._node("dir", { perms: "rwxr-xr-x" });
        return ERR_OK;
    }
    touch(path) {
        const r = this._resolve(path);
        if (r in this.tree) { this.tree[r].modified = nowSec(); return ERR_OK; }
        const parent = r.split("/").slice(0, -1).join("/") || "/";
        if (!(parent in this.tree)) return ERR_NOT_FOUND;
        this.tree[r] = this._node("file");
        return ERR_OK;
    }
    write(path, content) {
        const r = this._resolve(path);
        if (r in this.tree && this.tree[r].type === "dir") return ERR_INVALID;
        const parent = r.split("/").slice(0, -1).join("/") || "/";
        if (!(parent in this.tree)) return ERR_NOT_FOUND;
        if (!(r in this.tree)) this.tree[r] = this._node("file", { content });
        else { this.tree[r].content = content; this.tree[r].modified = nowSec(); }
        return ERR_OK;
    }
    append(path, content) {
        const r = this._resolve(path);
        if (!(r in this.tree) || this.tree[r].type !== "file") return ERR_NOT_FOUND;
        this.tree[r].content += content;
        this.tree[r].modified = nowSec();
        return ERR_OK;
    }
    read(path) {
        const r = this._resolve(path);
        if (!(r in this.tree)) return [null, ERR_NOT_FOUND];
        if (this.tree[r].type !== "file") return [null, ERR_INVALID];
        return [this.tree[r].content, ERR_OK];
    }
    rm(path) {
        const r = this._resolve(path);
        if (!(r in this.tree)) return ERR_NOT_FOUND;
        if (this.tree[r].type === "dir") return ERR_INVALID;
        delete this.tree[r];
        return ERR_OK;
    }
    rmdir(path) {
        const r = this._resolve(path);
        if (!(r in this.tree)) return ERR_NOT_FOUND;
        if (this.tree[r].type !== "dir") return ERR_INVALID;
        for (const k of Object.keys(this.tree)) if (k !== r && k.startsWith(r + "/")) return ERR_INVALID;
        if (r === "/") return ERR_PERMISSION;
        delete this.tree[r];
        return ERR_OK;
    }
    ls(path = null) {
        const r = this._resolve(path || this.cwd);
        if (!(r in this.tree) || this.tree[r].type !== "dir") return [null, ERR_NOT_FOUND];
        const prefix = r === "/" ? "/" : r + "/";
        const entries = [];
        for (const k of Object.keys(this.tree).sort()) {
            if (k === r || !k.startsWith(prefix)) continue;
            const rest = k.slice(prefix.length);
            if (!rest.includes("/")) entries.push([rest, this.tree[k].type, this.tree[k].perms]);
        }
        return [entries, ERR_OK];
    }
    mv(src, dst) {
        const rs = this._resolve(src), rd = this._resolve(dst);
        if (!(rs in this.tree)) return ERR_NOT_FOUND;
        const node = this.tree[rs];
        delete this.tree[rs];
        this.tree[rd] = node;
        if (node.type === "dir") {
            for (const k of Object.keys(this.tree).slice()) {
                if (k.startsWith(rs + "/")) { this.tree[k.replace(rs, rd)] = this.tree[k]; delete this.tree[k]; }
            }
        }
        return ERR_OK;
    }
    cp(src, dst) {
        const rs = this._resolve(src), rd = this._resolve(dst);
        if (!(rs in this.tree) || this.tree[rs].type === "dir") return ERR_NOT_FOUND;
        this.tree[rd] = JSON.parse(JSON.stringify(this.tree[rs]));
        this.tree[rd].created = nowSec();
        return ERR_OK;
    }
    chmod(path, perms) {
        const r = this._resolve(path);
        if (!(r in this.tree)) return ERR_NOT_FOUND;
        this.tree[r].perms = perms;
        return ERR_OK;
    }
    stat(path) {
        const r = this._resolve(path);
        if (!(r in this.tree)) return [null, ERR_NOT_FOUND];
        const n = this.tree[r];
        const info = { path: r, type: n.type, perms: n.perms, owner: n.owner, created: n.created, modified: n.modified };
        if (n.type === "file") info.size = (n.content || "").length;
        return [info, ERR_OK];
    }
    treeView(path = null, prefix = "", depth = 0, maxDepth = 4) {
        const r = this._resolve(path || this.cwd);
        if (depth > maxDepth) return [];
        const [entries, err] = this.ls(r);
        if (err !== ERR_OK) return [];
        const lines = [];
        for (const [name, typ] of entries) {
            lines.push(prefix + name + (typ === "dir" ? "/" : ""));
            if (typ === "dir" && depth < maxDepth) {
                const child = r === "/" ? "/" + name : r + "/" + name;
                lines.push(...this.treeView(child, prefix + "  ", depth + 1, maxDepth));
            }
        }
        return lines;
    }
    cd(path) {
        const r = this._resolve(path);
        if (!(r in this.tree) || this.tree[r].type !== "dir") return ERR_NOT_FOUND;
        this.cwd = r;
        return ERR_OK;
    }
    serialize() { return JSON.stringify({ tree: this.tree, cwd: this.cwd }); }
    deserialize(data) { const o = JSON.parse(data); this.tree = o.tree; this.cwd = o.cwd || "/"; }
}

class ProcessTable {
    constructor() { this.processes = {}; this.nextPid = 1; this.tickCount = 0; }
    spawn(name, state = "running") {
        const pid = this.nextPid++;
        this.processes[pid] = { name, state, started: nowSec(), ticks: 0 };
        return pid;
    }
    kill(pid) { if (!(pid in this.processes)) return ERR_NO_PROCESS; delete this.processes[pid]; return ERR_OK; }
    tick() {
        this.tickCount++;
        for (const pid of Object.keys(this.processes))
            if (this.processes[pid].state === "running") this.processes[pid].ticks++;
        return this.tickCount;
    }
    ps() { return Object.entries(this.processes); }
    status(pid) { return pid in this.processes ? [this.processes[pid], ERR_OK] : [null, ERR_NO_PROCESS]; }
}

class OZLedger {
    constructor() { this.entries = []; }
    recordEx(command, parsedCmd, parsedArgs, actor, tick, resultCode, explanation, reversible = 0, undoPath = null, undoContent = null, undoIsDir = 0, undoWasCreate = 0) {
        this.entries.push({ command, parsed_cmd: parsedCmd || "", parsed_args: parsedArgs || "", actor, tick, timestamp: nowSec(),
            result_code: resultCode, explanation: explanation || "executed", reversible, undo_path: undoPath || "",
            undo_content: undoContent || "", undo_is_dir: undoIsDir, undo_was_create: undoWasCreate });
    }
    trace(n = 10) { return this.entries.slice(-n); }
    replayInfo() { return this.entries; }
    size() { return this.entries.length; }
}

class OZLayer {
    constructor() {
        this.slots = Object.fromEntries(BUILTIN_SLOTS.map(s => [s, []]));
        this.modules = {}; this.overheads = {};
        this.hooks = { boot: [], sched: [], ai: [], diag: [], experiment: [] };
        this.contracts = {};
    }
    registerModule(name, mod) {
        this.modules[name] = mod;
        const ov = { dispatch_entries: (mod.commands || []).length, hooks: 0, slots_occupied: [] };
        for (const s of (mod.slots || [])) if (s in this.slots) { this.slots[s].push(name); ov.slots_occupied.push(s); }
        for (const h of (mod.hooks || [])) if (h in this.hooks) { this.hooks[h].push(name); ov.hooks++; }
        if (mod.contract) this.contracts[name] = mod.contract;
        this.overheads[name] = ov;
        if (mod.init) mod.init.call(mod);
        return ERR_OK;
    }
    unregisterModule(name) {
        if (!(name in this.modules)) return ERR_NOT_FOUND;
        const mod = this.modules[name];
        if (mod.shutdown) mod.shutdown.call(mod);
        for (const s of Object.keys(this.slots)) { const i = this.slots[s].indexOf(name); if (i >= 0) this.slots[s].splice(i, 1); }
        for (const h of Object.keys(this.hooks)) { const i = this.hooks[h].indexOf(name); if (i >= 0) this.hooks[h].splice(i, 1); }
        delete this.contracts[name]; delete this.modules[name]; delete this.overheads[name];
        return ERR_OK;
    }
    totalOverhead() {
        const t = { dispatch_entries: 0, hooks: 0, slots_occupied: 0, modules: Object.keys(this.modules).length };
        for (const ov of Object.values(this.overheads)) {
            t.dispatch_entries += ov.dispatch_entries; t.hooks += ov.hooks; t.slots_occupied += ov.slots_occupied.length;
        }
        return t;
    }
    callModule(modName, method) {
        if (!(modName in this.modules)) return [null, ERR_NOT_FOUND];
        const mod = this.modules[modName];
        if (typeof mod[method] !== "function") return [null, ERR_INVALID];
        return [mod[method].call(mod), ERR_OK];
    }
}

function makeModules() {
    return {
        coreutils: { name: "coreutils", description: "Core utilities module", commands: ["uptime"], slots: ["shell.commands"], hooks: [],
            contract: { provides: ["uptime"], requires: [], version: "0.1" }, init() { this.start = nowSec(); }, uptime() { return `System up for ${Math.floor(nowSec() - this.start)} seconds`; } },
        hwprobe: { name: "hwprobe", description: "Hardware probe module", commands: ["hwinfo"], slots: ["diagnostics"], hooks: ["boot"],
            contract: { provides: ["hwinfo"], requires: [], version: "0.1" }, init() {}, hwinfo(hw) { return hw; } },
        diag: { name: "diag", description: "Diagnostics module", commands: ["diag_status"], slots: ["diagnostics"], hooks: ["diag"],
            contract: { provides: ["diag_status"], requires: [], version: "0.1" }, init() {}, diag_status() { return "diagnostics: nominal"; } },
        ai_seed: { name: "ai_seed", description: "AI seed hooks module", commands: ["ai_status"], slots: ["ai.hooks"], hooks: ["ai"],
            contract: { provides: ["ai_status", "intent_hints"], requires: ["oz.ledger"], version: "0.1" }, init() {}, ai_status() { return "ai_seed: active, no external model loaded"; } },
        oz_ledger: { name: "oz_ledger", description: "OZ Ledger provenance tracking module", commands: ["ledger_size"], slots: ["oz.ledger", "oz.contracts"], hooks: ["ai"],
            contract: { provides: ["ledger_size", "trace", "replay"], requires: [], version: "0.1" }, init() {}, ledger_size(ledger) { return ledger.size(); } },
        fortune_ext: { name: "fortune_ext", description: "Example extension: fortune cookies", commands: ["fortune"], slots: ["shell.commands", "experiments"], hooks: ["experiment"],
            contract: { provides: ["fortune"], requires: [], version: "0.1" }, init() { this.fortunes = ["The system is the territory.","Every overhead has a name.","A module is a guest with manners.","Slots are finite; ambition is not.","Trace everything. Regret nothing."]; this.idx = 0; },
            fortune() { return this.fortunes[this.idx++ % this.fortunes.length]; } }
    };
}

class AmosOZKernel {
    constructor() {
        this.name = SYSTEM_NAME; this.version = VERSION; this.bootTime = 0; this.hw = {}; this.mem = null; this.fs = null;
        this.procs = null; this.oz = new OZLayer(); this.ledger = new OZLedger(); this.env = {}; this.user = "user";
        this.history = []; this.devices = []; this.running = true; this.hookBootFired = 0; this.hookSchedFired = 0;
        this.bootLog = ""; this.fortuneIdx = 0; this.fortuneOzIdx = 0; this.shellStdinBuf = ""; this.shellDepth = 0;
        this.pendingLedger = {}; this._kernelInit();
    }
    _kernelInit() {
        this.hw = detectHardware(); this.mem = new VirtualMemory(65536); this.fs = new VirtualFS(this);
        this.procs = new ProcessTable(); this.ledger = new OZLedger(); this.env = {}; this.history = [];
        this.user = "user"; this.running = true; this.hookBootFired = 0; this.hookSchedFired = 0;
        this.fortuneIdx = 0; this.fortuneOzIdx = 0; this.shellStdinBuf = ""; this.shellDepth = 0; this.pendingLedger = {};
        this.devices = [{ name: "console", type: "char", status: "active" },{ name: "mem", type: "block", status: "active" },
            { name: "null", type: "char", status: "active" },{ name: "zero", type: "char", status: "active" }];
        this.bootTime = nowSec(); this.oz = new OZLayer();
        for (const [k, m] of Object.entries(makeModules())) this.oz.registerModule(k, Object.assign({}, m));
        this.envSet("HOME", "/home/user"); this.envSet("USER", "user"); this.envSet("SHELL", "/bin/amossh");
        this.envSet("PATH", "/bin:/usr/bin"); this.envSet("TERM", this.hw.terminal || "unknown");
        this.envSet("HOSTNAME", this.hw.hostname || "amosoz");
        this.procs.spawn("init"); this.procs.spawn("amossh");
        this.hookBootFired = this.fireHook("boot");
        this.bootLog = `[boot] amosOZ ${VERSION} started\n[boot] ${this.hookBootFired} hook subscribers on boot\n[boot] dedicated to Amos Oz (עוז)\n`;
        this.procRefreshAll();
    }
    envSet(k, v) { this.env[k] = v; }
    envGet(k) { return this.env[k]; }
    envUnset(k) { delete this.env[k]; }
    fireHook(name) { return (this.oz.hooks[name] || []).length; }
    validateModuleContracts() {
        for (const [name, c] of Object.entries(this.oz.contracts)) {
            if (!(name in this.oz.modules)) continue;
            for (const req of (c.requires || [])) if (!(this.oz.slots[req] || []).length) return ERR_MODULE;
        }
        return ERR_OK;
    }
    procIsVirtual(path) { return path && (path === "/proc" || path.startsWith("/proc/")); }
    accessNode(path, op) { return this.fs.access(path, this.user, op); }
    procRefreshAll() {
        const elapsed = Math.floor(nowSec() - this.bootTime);
        this._procWrite("/proc/uptime", `${elapsed}.0\n`);
        const free = this.mem.total - this.mem.used;
        this._procWrite("/proc/meminfo", `MemTotal:       ${this.mem.total} kB\nMemFree:        ${free} kB\nMemAvailable:   ${free} kB\n`);
        const cores = this.hw.cpu_count > 0 ? this.hw.cpu_count : 1;
        this._procWrite("/proc/cpuinfo", `processor\t: 0\nmodel name\t: amosOZ virtual cpu\ncpu cores\t: ${cores}\nhostname\t: ${this.hw.hostname || "amosoz"}\n`);
        this._procWrite("/proc/version", `${SYSTEM_NAME} ${VERSION} ${this.hw.machine || "browser"} ${this.hw.platform || "unknown"}\n`);
        this._procWrite("/proc/self/status", `Name:\tamossh\nPid:\t1\nState:\trunning (virtual)\nVmSize:\t${this.mem.used} kB\nThreads:\t${this.procs.nextPid - 1}\n`);
    }
    _procWrite(path, content) {
        if (!(path in this.fs.tree)) this.fs.tree[path] = this.fs._node("file", { owner: "root", content, perms: "r--r--r--" });
        else { this.fs.tree[path].content = content; this.fs.tree[path].modified = nowSec(); }
    }
    ledgerMetaClear() { this.pendingLedger = {}; }
    ledgerMetaSet(reversible, explanation, undoPath = null, undoContent = null, undoIsDir = 0, undoWasCreate = 0) {
        this.pendingLedger = { active: true, reversible, explanation, undo_path: undoPath || "", undo_content: undoContent || "", undo_is_dir: undoIsDir, undo_was_create: undoWasCreate };
    }
    kernelSyscall(op, argv) {
        if (op === "read") {
            if (!argv.length) return ["", ERR_INVALID];
            const [c, err] = this.fs.readToBuf(argv[0]); return [c || "", err];
        }
        if (op === "write") {
            if (argv.length < 2) return ["", ERR_INVALID];

    }
    _cmdHead(argv) {
        const args = argv.slice(1); let n = 10, fi = 0;
        if (args.length > 2 && args[0] === "-n") { n = parseInt(args[1], 10); fi = 2; }
        let data, err;
        if (args.length > fi) [data, err] = this.fs.readToBuf(args[fi]);
        else if (this.shellStdinBuf) { data = this.shellStdinBuf; err = ERR_OK; }
        else return ["Usage: head [-n N] [file]", ERR_INVALID];
        if (err !== ERR_OK) return ["", err];
        const lines = data.split("\n").slice(0, n);
        return [lines.join("\n") + (data ? "\n" : ""), ERR_OK];
    }
    _cmdTail(argv) {
        const args = argv.slice(1); let n = 10, fi = 0;
        if (args.length > 2 && args[0] === "-n") { n = parseInt(args[1], 10); fi = 2; }
        let data, err;
        if (args.length > fi) [data, err] = this.fs.readToBuf(args[fi]);
        else if (this.shellStdinBuf) { data = this.shellStdinBuf; err = ERR_OK; }
        else return ["Usage: tail [-n N] [file]", ERR_INVALID];
        if (err !== ERR_OK) return ["", err];
        const lines = data.split("\n");
        return [lines.slice(-n).join("\n") + (lines.length ? "\n" : ""), ERR_OK];
    }
    _cmdWc(argv) {
        const args = argv.slice(1); let wantL = false, wantW = false, wantC = false, fi = 0;
        while (fi < args.length && args[fi].startsWith("-")) {
            if (args[fi].includes("l")) wantL = true; if (args[fi].includes("w")) wantW = true; if (args[fi].includes("c")) wantC = true; fi++;
        }
        if (!wantL && !wantW && !wantC) wantL = true;
        let data, err;
        if (fi < args.length) [data, err] = this.fs.readToBuf(args[fi]);
        else if (this.shellStdinBuf) { data = this.shellStdinBuf; err = ERR_OK; }
        else return ["Usage: wc [-l|-w|-c] [file]", ERR_INVALID];
        if (err !== ERR_OK) return ["", err];
        const lines = data ? data.split("\n") : [""];
        const words = lines.reduce((w, l) => w + (l ? l.trim().split(/\s+/).filter(Boolean).length : 0), 0);
        const parts = [];
        if (wantL) parts.push(String(data ? lines.length : 0));
        if (wantW) parts.push(String(words));
        if (wantC) parts.push(String(data.length));
        return [parts.join(" "), ERR_OK];
    }
    _cmdTest(argv) {
        let args = argv.slice(1);
        if (args.length && args[args.length - 1] === "]") args = args.slice(0, -1);
        if (args[0] === "-f" && args.length >= 2) {
            const r = this.fs.resolveNode(args[1]); const node = this.fs.tree[r];
            return ["", node && node.type === "file" ? ERR_OK : ERR_INVALID];
        }
        if (args[0] === "-d" && args.length >= 2) {
            const r = this.fs.resolveNode(args[1]); const node = this.fs.tree[r];
            return ["", node && node.type === "dir" ? ERR_OK : ERR_INVALID];
        }
        if (args[0] === "-e" && args.length >= 2) return ["", this.fs.resolveNode(args[1]) in this.fs.tree ? ERR_OK : ERR_INVALID];
        if (args[0] === "-z" && args.length >= 2) return ["", !args[1] ? ERR_OK : ERR_INVALID];
        if (args.length >= 3 && args[1] === "=") return ["", args[0] === args[2] ? ERR_OK : ERR_INVALID];
        return ["", ERR_INVALID];
    }
    _cmdExport(argv) {
        const args = argv.slice(1);
        if (!args.length) return ["Usage: export KEY=VAL", ERR_INVALID];
        if (!args[0].includes("=")) return [`${args[0]}=${this.envGet(args[0]) || ""}`, ERR_OK];
        const [key, ...rest] = args[0].split("="); this.envSet(key, rest.join("=")); return ["", ERR_OK];
    }
    _cmdSource(argv) {
        const args = argv.slice(1);
        if (!args.length) return ["Usage: source <file>", ERR_INVALID];
        const r = this.fs._resolve(args[0]); const node = this.fs.tree[r];
        if (!node) return [`source: ${args[0]}: not found`, ERR_NOT_FOUND];
        let body = node.content || "";
        if (body.startsWith("#!")) body = body.includes("\n") ? body.split("\n").slice(1).join("\n") : "";
        const outs = [];
        for (const line of body.split("\n")) {
            const t = strTrim(line);
            if (t && !t.startsWith("#")) { const o = this.shellExecuteLine(t); if (o) outs.push(o); }
        }
        return [outs.join("\n"), ERR_OK];
    }
    _cmdFind(argv) {
        const args = argv.slice(1); let root = "/", pattern = "*";
        for (let i = 0; i < args.length; i++) {
            if (args[i] === "-name" && i + 1 < args.length) { pattern = args[++i]; }
            else if (args[i].startsWith("/")) root = args[i];
        }
        const prefix = root === "/" ? "/" : root + "/";
        const hits = [];
        for (const path of Object.keys(this.fs.tree).sort()) {
            if (path !== root && !path.startsWith(prefix)) continue;
            const base = path.split("/").pop();
            if (patmatch(pattern, base)) hits.push(path);
        }
        return [hits.join("\n") + (hits.length ? "\n" : ""), ERR_OK];
    }
    _cmdDoctor() {
        let issues = 0;
        const lines = ["amosOZ doctor:"];
        if (this.validateModuleContracts() !== ERR_OK) { lines.push("  [FAIL] contracts"); issues++; }
        else lines.push("  [OK] contracts");
        if (this.hookBootFired <= 0) { lines.push("  [FAIL] boot hooks"); issues++; }
        else lines.push(`  [OK] boot hooks (${this.hookBootFired})`);
        if (!("/proc/uptime" in this.fs.tree)) { lines.push("  [FAIL] /proc"); issues++; }
        else lines.push("  [OK] /proc");
        if ("/usr/share/amosoz/quotes.txt" in this.fs.tree) lines.push("  [OK] oz quotes");
        else lines.push("  [WARN] oz quotes");
        lines.push(issues ? "  STATUS: needs attention" : "  STATUS: healthy");
        return [lines.join("\n"), issues ? ERR_INVALID : ERR_OK];
    }
    _cmdFortune(argv) {
        const args = argv.slice(1);
        if (args[0] === "oz") {
            const [data, err] = this.fs.readToBuf("/usr/share/amosoz/quotes.txt");
            if (err !== ERR_OK) return ["fortune oz: quotes not found", ERR_NOT_FOUND];
            const qlines = data.split("\n").filter(l => l.trim());
            if (!qlines.length) return ["(no oz quotes)", ERR_OK];
            const line = qlines[this.fortuneOzIdx++ % qlines.length];
            return [line, ERR_OK];
        }
        const F = ["The system is the territory.","Every overhead has a name.","A module is a guest with manners.","Slots are finite; ambition is not.","Trace everything. Regret nothing."];
        return [F[this.fortuneIdx++ % F.length], ERR_OK];
    }
    _cmdSelftest() {
        const results = []; let passed = 0;
        const check = (name, cond) => { if (cond) passed++; results.push(`  [${cond ? "PASS" : "FAIL"}] ${name}`); };
        check("boot_state", this.bootTime > 0);
        check("hw_profile", (this.hw.platform || "").length > 0);
        check("version", VERSION === "0.4.0");
        this.fs.write("/tmp/selftest_file", "hello");
        let [c] = this.fs.read("/tmp/selftest_file");
        check("fs_write_read", c === "hello");
        this.fs.append("/tmp/selftest_file", " world");
        [c] = this.fs.read("/tmp/selftest_file");
        check("fs_append", c === "hello world");
        this.fs.rm("/tmp/selftest_file");
        check("fs_delete", !("/tmp/selftest_file" in this.fs.tree));
        this.fs.mkdir("/tmp/st_dir");
        check("fs_mkdir", "/tmp/st_dir" in this.fs.tree);
        this.fs.rmdir("/tmp/st_dir");
        check("fs_rmdir", !("/tmp/st_dir" in this.fs.tree));
        this.fs.write("/tmp/ptest", "data");
        this.fs.chmod("/tmp/ptest", "r--------");
        const [info] = this.fs.stat("/tmp/ptest");
        check("permission_mutation", info && info.perms === "r--------");
        check("permission_enforced", this.fs.access("/tmp/ptest", "user", "w") === ERR_PERMISSION);
        this.fs.rm("/tmp/ptest");
        this.procRefreshAll();
        [c] = this.fs.read("/proc/uptime");
        check("proc_uptime", c && c.includes("."));
        const [osr] = this.fs.read("/etc/os-release");
        check("os_release", osr && osr.includes("ID=amosoz"));
        const [sc, err] = this.kernelSyscall("read", ["/etc/hostname"]);
        check("syscall_read", err === ERR_OK && sc.includes("amosoz"));
        check("hook_boot_fired", this.hookBootFired > 0);
        check("contract_validation", this.validateModuleContracts() === ERR_OK);
        const [bid, merr] = this.mem.alloc(100, "selftest");
        check("mem_alloc", bid && merr === ERR_OK);
        check("mem_free", this.mem.free(bid) === ERR_OK);
        check("command_dispatch", this.dispatch("echo selftest_token").includes("selftest_token"));
        const pid = this.procs.spawn("test_proc");
        check("process_spawn", pid > 0);
        this.procs.kill(pid);
        check("process_kill", !(pid in this.procs.processes));
        check("module_registered", "coreutils" in this.oz.modules);
        check("slot_occupation", this.oz.slots["shell.commands"].length > 0);
        check("overhead_accounting", this.oz.totalOverhead().modules > 0);
        check("oz_layer", Object.keys(this.oz.slots).length === 10);
        check("oz_ledger", this.ledger.size() > 0);
        check("ledger_parsed", this.ledger.entries.some(e => e.parsed_cmd));
        this.dispatch("write /tmp/undo_me undo_payload");
        const u = this.dispatch("undo");
        check("ledger_undo", u.includes("Undid") || !("/tmp/undo_me" in this.fs.tree));
        this.dispatch("echo treaty_redir > /tmp/shell_redir");
        [c] = this.fs.read("/tmp/shell_redir");
        check("shell_redirect", c && c.includes("treaty_redir"));
        this.dispatch("echo appended >> /tmp/shell_redir");
        [c] = this.fs.read("/tmp/shell_redir");
        check("shell_append", c && c.includes("appended"));
        check("shell_pipe", this.dispatch("echo pipe_token | cat").includes("pipe_token"));
        check("path_which", this.dispatch("which echo").includes("/bin/echo"));
        const ex = this.dispatch("exec /home/user/hello.amos resonance");
        check("script_exec", ex.includes("Script greeting") && ex.includes("resonance"));
        this.dispatch("echo grepme > /tmp/grep.txt");
        check("cmd_grep", this.dispatch("grep grepme /tmp/grep.txt").includes("grepme"));
        check("cmd_head", !!this.dispatch("head -n 1 /etc/motd"));
        const wc = this.dispatch("wc -l /etc/motd").trim();
        check("cmd_wc", /^\d+$/.test(wc) && parseInt(wc, 10) >= 1);
        const [, terr] = this._cmdTest(["test", "-f", "/etc/hostname"]);
        check("cmd_test", terr === ERR_OK);
        this.dispatch("ln -s /etc/motd /tmp/motd_link");
        check("cmd_ln", this.fs.resolveNode("/tmp/motd_link") in this.fs.tree);
        check("cmd_find", this.dispatch("find /usr -name quotes.txt").includes("quotes.txt"));
        this.dispatch("export TIER=v4");
        check("cmd_export", this.dispatch("export TIER").includes("TIER=v4"));
        check("fortune_oz", !!this.dispatch("fortune oz"));
        check("cmd_spec", this.dispatch("spec").includes(VERSION));
        check("cmd_doctor", this.dispatch("doctor").includes("healthy"));
        check("shell_stdin_redirect", this.dispatch("cat < /etc/hostname").includes("amosoz"));
        const total = results.length;
        return `amosOZ Selftest (${passed}/${total} passed):\n${results.join("\n")}\n\n  ${passed === total ? "ALL TESTS PASSED" : `${total - passed} TESTS FAILED`}`;
    }
}

// ─── Terminal UI ──────────────────────────────────────────────────────────
const outputEl = document.getElementById("output");
const inputEl = document.getElementById("input");
const promptEl = document.getElementById("prompt");
const kernel = new AmosOZKernel();
let historyIdx = -1;

function updatePrompt() {
    promptEl.textContent = `${kernel.user}@amosoz:${kernel.fs.cwd}$ `;
}

function print(text) {
    if (text === "\x1b[2J\x1b[H" || text === "\x1b[CLEAR]") { outputEl.textContent = ""; return; }
    outputEl.textContent += text + "\n";
    outputEl.scrollTop = outputEl.scrollHeight;
}

print(MOTD);
updatePrompt();

inputEl.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        const line = inputEl.value;
        print(`${promptEl.textContent}${line}`);
        inputEl.value = "";
        historyIdx = -1;
        if (line.trim()) {
            const result = kernel.dispatch(line);
            if (result) print(result);
        }
        updatePrompt();
        if (!kernel.running) { inputEl.disabled = true; }
    } else if (e.key === "ArrowUp") {
        e.preventDefault();
        if (kernel.history.length) {
            if (historyIdx < 0) historyIdx = kernel.history.length - 1;
            else if (historyIdx > 0) historyIdx--;
            inputEl.value = kernel.history[historyIdx];
        }
    } else if (e.key === "ArrowDown") {
        e.preventDefault();
        if (historyIdx >= 0) {
            historyIdx++;
            if (historyIdx >= kernel.history.length) { historyIdx = -1; inputEl.value = ""; }
            else inputEl.value = kernel.history[historyIdx];
        }
    }
});

document.addEventListener("click", () => inputEl.focus());
